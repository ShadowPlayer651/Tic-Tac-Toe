<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe Online</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0d0d0d;
        color: white;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    .fade {
        animation: fadeIn 0.5s ease forwards;
        opacity: 0;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #lobby {
        text-align: center;
        padding-top: 60px;
        display: block;
    }

    #lobby h1 {
        font-size: 50px;
        margin-bottom: 20px;
    }

    #lobby button {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        transition: 0.2s;
    }

    #playLocalBtn { background: #444; color: white; }
    #playOnlineBtn { background: #0a84ff; color: white; }
    #settingsBtn { background: #00cc44; color: white; }

    #lobby button:hover {
        transform: scale(1.05);
    }

    #playerNameInput {
        padding: 10px;
        border-radius: 10px;
        border: none;
        width: 200px;
        margin-top: 20px;
    }

    #gameScreen {
        display: none;
        text-align: center;
        padding-top: 20px;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
        justify-content: center;
        margin-top: 30px;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: #222;
        font-size: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        border-radius: 10px;
        transition: transform 0.2s, background 0.2s;
    }

    .cell:hover {
        background: #333;
        transform: scale(1.05);
    }

    .cell.win {
        background: #00cc44 !important;
        transform: scale(1.2);
    }

    #status {
        margin-top: 20px;
        font-size: 24px;
    }

    #roomUI {
        margin-top: 20px;
    }

    #roomUI input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        width: 150px;
    }

    #roomUI button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 5px;
        transition: 0.2s;
    }

    #createRoomBtn,
    #joinRoomBtn {
        background: #0a84ff;
        color: white;
    }

    #randomBtn {
        background: #00cc44;
        color: white;
    }

    #roomUI button:hover {
        transform: scale(1.05);
    }

    #chatBox {
        margin-top: 30px;
    }

    #messages {
        width: 300px;
        height: 200px;
        background: #222;
        margin: auto;
        padding: 10px;
        overflow-y: auto;
        border-radius: 10px;
        text-align: left;
    }

    #chatInput {
        margin-top: 10px;
        width: 200px;
        padding: 10px;
        border-radius: 10px;
        border: none;
    }

    #sendBtn {
        padding: 10px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        background: #0a84ff;
        color: white;
        cursor: pointer;
    }

    #settingsMenu {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        padding: 20px;
        border-radius: 15px;
        width: 300px;
        text-align: center;
        animation: fadeIn 0.3s ease forwards;
    }

    #settingsMenu h2 {
        margin-bottom: 20px;
    }

    #settingsMenu button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        cursor: pointer;
    }

    #winAnimation {
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.8);
        color:white;
        font-size:60px;
        justify-content:center;
        align-items:center;
        z-index:999;
    }
</style>
</head>

<body>

<div id="lobby" class="fade">
    <h1>Tic Tac Toe</h1>
    <button id="playLocalBtn">Play Local</button>
    <button id="playOnlineBtn">Play Online</button>
    <button id="settingsBtn">Settings</button>

    <br>
    <input id="playerNameInput" placeholder="Your name...">
</div>

<div id="settingsMenu">
    <h2>Settings</h2>
    <label>
        <input type="checkbox" id="darkModeToggle">
        Dark Mode
    </label><br><br>

    <label>
        <input type="checkbox" id="animationsToggle" checked>
        Animations
    </label>

    <button id="closeSettingsBtn">Close</button>
</div>

<div id="gameScreen" class="fade">

    <div id="roomUI">
        <input id="roomCodeInput" placeholder="Room code...">
        <button id="createRoomBtn">Create Room</button>
        <button id="joinRoomBtn">Join Room</button>
        <button id="randomBtn">Random Match</button>
    </div>

    <div id="status">Local mode: click a cell to play.</div>

    <div id="board"></div>

    <div id="chatBox">
        <div id="messages"></div>
        <input id="chatInput" placeholder="Type message...">
        <button id="sendBtn">Send</button>
    </div>

</div>

<div id="winAnimation"></div>

<script src="game.js" type="module"></script>

</body>
</html>
